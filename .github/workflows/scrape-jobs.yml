name: Scrape government job portals

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes — near-real-time without relying on Bluehost cron
  workflow_dispatch: {}       # lets you trigger a run manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      INGEST_URL: https://bharatvacancy.com/ingest.php
      INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run every scraper
        run: |
          set +e
          FAILED=0
          for f in *_scraper.py; do
            [ -e "$f" ] || continue
            echo "::group::$f"
            python "$f"
            if [ $? -ne 0 ]; then
              echo "$f FAILED"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED
