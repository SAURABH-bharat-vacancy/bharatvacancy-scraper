name: Scrape Jobs Daily

on:
  schedule:
    - cron: '30 0 * * *'  # 6:00 AM IST (runs at 00:30 UTC)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4
    
    - name: Scrape SSC jobs
      run: python job_scraper.py
    
    - name: Scrape IBPS jobs
      run: python ibps_scraper.py
    
    - name: Commit and push
      run: |
        git config user.name "GitHub Bot"
        git config user.email "bot@github.com"
        git add ssc_import.csv ibps_import.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Daily job update: $(date)" && git push)
