name: SSC Job Scraper

on:
  schedule:
    - cron: '30 0 * * *'    # runs daily at 6:00 AM India time
  workflow_dispatch:          # adds a "Run workflow" button so you can run it any time

permissions:
  contents: write             # lets the scraper save the CSV files back into the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: pip install requests

      - name: Run the SSC scraper
        run: python job_scraper.py

      - name: Save the fresh CSV files back to the repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ssc_jobs.csv ssc_import.csv
          git commit -m "Update SSC job CSVs (auto)" || echo "No changes to commit"
          git push
